# Netlify build settings for the Sutura Genomics site (Next.js static export).
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (the static export can't host Next.js API routes).
[functions]
  directory = "netlify/functions"

# Friendly /api/upload path -> the upload function.
[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

# Security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # 'wasm-unsafe-eval' lets the demo instantiate the h5wasm WebAssembly module
    # used to parse uploaded .h5ad files in the browser. blob: worker/script for
    # the same. Everything else stays locked down.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob: https://mnvwblgtkfnbtqzydgdp.supabase.co https://api.web3forms.com; form-action 'self' https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"
